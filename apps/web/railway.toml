# Servicio frontend en Railway.
# Settings:
#   - Root Directory: /  (raíz del monorepo; el Dockerfile copia apps/web)
#   - Config as Code: /apps/web/railway.toml
# Variables:
#   - NEXT_PUBLIC_API_URL = https://TU-API.up.railway.app

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile"
watchPatterns = ["apps/web/**"]

[deploy]
startCommand = "sh -c 'node server.js'"
healthcheckPath = "/login"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
