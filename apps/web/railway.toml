# Servicio frontend en Railway.
# Settings del servicio:
#   - Root Directory: /  (raíz del monorepo)
#   - Config as Code path: /apps/web/railway.toml
# Variables:
#   - NEXT_PUBLIC_API_URL = https://TU-API.up.railway.app  (sin barra final)

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile"
watchPatterns = ["apps/web/**"]

[deploy]
startCommand = "sh -c 'node apps/web/server.js'"
healthcheckPath = "/login"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
