# Config as code en la RAÍZ del monorepo.
# Railway NO sigue Root Directory para este archivo; debe vivir aquí
# o indicar la ruta absoluta /apps/api/railway.toml en Settings.
#
# Fuerza Docker + API Python para evitar que Railpack detecte el package.json de Node.

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"
watchPatterns = ["apps/api/**"]

[deploy]
startCommand = "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
